<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuackZap PRO 🦆</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #FFD700;
            --primary-glow: rgba(255, 215, 0, 0.4);
            --bg-glass: rgba(0, 0, 0, 0.85);
            --me-msg: rgba(255, 215, 0, 0.25);
            --other-msg: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #000; color: white;
            overflow: hidden;
        }

        /* LOGIN */
        #login {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
        }
        .login-card {
            background: #151515; padding: 30px; border-radius: 20px;
            text-align: center; border: 1px solid var(--primary);
            width: 80%; max-width: 300px;
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .login-card input {
            width: 100%; background: #222; border: 1px solid #333;
            padding: 12px; margin-bottom: 10px; border-radius: 8px;
            color: white; outline: none; box-sizing: border-box;
        }
        .login-card button {
            width: 100%; background: var(--primary); color: black;
            padding: 12px; border-radius: 8px; border: none;
            font-weight: bold; cursor: pointer;
        }

        /* APP */
        .app {
            max-width: 600px; margin: auto; height: 100vh;
            display: flex; flex-direction: column;
            background: #000;
        }

        header {
            padding: 15px; background: var(--bg-glass);
            border-bottom: 2px solid var(--primary);
            text-align: center;
        }
        header h1 { margin: 0; font-size: 1.2rem; color: var(--primary); }

        /* CHAT COM FUNDO */
        #chat {
            flex: 1; overflow-y: auto; padding: 20px;
            background-image: url("img/image.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; flex-direction: column; gap: 25px;
            background-color: rgba(0,0,0,0.5);
            background-blend-mode: darken;
        }

        /* MENSAGEM */
        .msg {
            padding: 12px 16px; border-radius: 15px;
            max-width: 80%; position: relative;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: subir 0.3s ease;
        }

        .eu { align-self: flex-end; background: var(--me-msg); border: 1px solid rgba(255,215,0,0.3); border-bottom-right-radius: 2px; }
        .outro { align-self: flex-start; background: var(--other-msg); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 2px; }

        .msg b { display: block; font-size: 0.75rem; margin-bottom: 4px; color: var(--primary); }

        /* 🦆 PATO ANDANDO REALISTA */
        .msg::after {
            content: "🦆";
            position: absolute;
            bottom: -22px;
            font-size: 20px;
            animation: andarRealista 4s linear infinite;
        }
        .eu::after { right: 0; }
        .outro::after { left: 0; }

        @keyframes subir { from { opacity: 0; transform: translateY(10px); } }

        @keyframes andarRealista {
            0% { transform: translateX(0) rotate(0deg); }
            15% { transform: translateX(10px) rotate(10deg); }
            30% { transform: translateX(20px) rotate(-10deg); }
            45% { transform: translateX(30px) rotate(10deg); }
            50% { transform: translateX(35px) scaleX(-1); }
            65% { transform: translateX(25px) rotate(-10deg) scaleX(-1); }
            80% { transform: translateX(15px) rotate(10deg) scaleX(-1); }
            95% { transform: translateX(5px) rotate(-10deg) scaleX(-1); }
            100% { transform: translateX(0) rotate(0deg) scaleX(1); }
        }

        /* FOOTER */
        footer {
            display: flex; gap: 10px; padding: 15px;
            background: var(--bg-glass); align-items: center;
        }
        .input-box {
            flex: 1; background: rgba(255,255,255,0.1);
            border-radius: 25px; padding: 5px 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        footer input {
            background: transparent; border: none; color: white;
            padding: 10px 0; width: 100%; outline: none;
        }
        .btn-circle {
            width: 45px; height: 45px; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; background: var(--primary); color: black; font-size: 1.1rem;
        }
    </style>
</head>

<body>

<div id="login">
    <div class="login-card">
        <h2>🦆 QuackZap PRO</h2>
        <input id="nome" placeholder="Seu Nome">
        <input id="senha" type="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>
</div>

<div id="app" class="app" style="display:none;">
    <header>
        <h1><span>🦆</span> QuackZap PRO</h1>
    </header>

    <div id="chat"></div>

    <footer>
        <div class="input-box">
            <input id="msg" placeholder="Diga um quack..." autocomplete="off">
        </div>
        <button onclick="enviar()" class="btn-circle"><i class="fa-solid fa-paper-plane"></i></button>
    </footer>
</div>

<script>
const pubKey = "pub_678567323327";
const secKey = "sec_3cf96cf4b55a";

let nome = localStorage.getItem("nome");
let hash = localStorage.getItem("hash");

/* 🔊 SOM QUACK ATUALIZADO */
const somQuack = new Audio("sound/quack.mp3");

function gerarHash(txt){
    let hash = 0;
    for (let i = 0; i < txt.length; i++) {
        hash = (hash << 5) - hash + txt.charCodeAt(i);
        hash |= 0;
    }
    return hash.toString();
}

function login(){
    const n = document.getElementById("nome").value.trim();
    const s = document.getElementById("senha").value.trim();
    if(!n || !s) return;

    nome = n;
    hash = gerarHash(s);

    localStorage.setItem("nome", nome);
    localStorage.setItem("hash", hash);

    iniciar();
}

function iniciar(){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "flex";
    carregar();
}

if(nome && hash) iniciar();

function carregar(){
    fetch(`https://cbbase.qzz.io/projeto/${pubKey}?all=true`)
    .then(r => r.json())
    .then(dados => {
        if (!Array.isArray(dados)) return;
        let html = "";
        dados.forEach(item => {
            const d = item.data || item;
            if(!d.nome) return;
            const eu = d.nome === nome;
            html += `
            <div class="msg ${eu ? 'eu' : 'outro'}">
                <b>${d.nome}</b>
                ${d.msg || ""}
            </div>`;
        });

        if(chat.innerHTML !== html){
            const primeiraCarga = chat.innerHTML === "";
            chat.innerHTML = html;
            chat.scrollTop = chat.scrollHeight;
            
            if(!primeiraCarga) {
                somQuack.currentTime = 0;
                somQuack.play().catch(() => {});
            }
        }
    });
}

function enviar(){
    const texto = document.getElementById("msg").value.trim();
    if(!texto) return;

    document.getElementById("msg").value = "";

    somQuack.currentTime = 0;
    somQuack.play().catch(() => {});

    fetch('https://cbbase.qzz.io/projeto/' + secKey, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify([{ nome, hash, msg: texto }])
    }).then(() => {
        setTimeout(carregar, 500);
    });
}

document.getElementById("msg").addEventListener("keypress", e => {
    if(e.key === "Enter") enviar();
});

setInterval(carregar, 3000);
</script>

</body>
</html>
